version: '3.8'

services:
  mongodb:
    image: mongo:8
    container_name: product-catalog-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: product_catalog_oms
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongodb_data:/data/db
      - ./init-replica-set.sh:/docker-entrypoint-initdb.d/init-replica-set.sh
    networks:
      - app-network
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}) }" | mongosh --quiet
      interval: 5s
      timeout: 30s
      start_period: 0s
      start_interval: 1s
      retries: 30

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local

