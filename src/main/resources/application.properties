# MongoDB Configuration
# ============================================================================
# OPTION 1: MongoDB Atlas (Cloud) - Requires IP whitelisting
# Set MONGODB_URI environment variable, or override the default below.
# ============================================================================
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://democluster.elz1q.mongodb.net/?retryWrites=true&w=majority&appName=Demo-PC-OMS}
spring.data.mongodb.database=demo_pc_oms

# ============================================================================
# OPTION 2: Local MongoDB (Uncomment to use local instead of Atlas)
# ============================================================================
# Start local MongoDB with: docker run -d -p 27017:27017 --name mongodb mongo:8
# Then set: MONGODB_URI=mongodb://localhost:27017
# Or uncomment the line below and comment out the Atlas URI above:
#
# spring.data.mongodb.uri=mongodb://localhost:27017
# spring.data.mongodb.database=demo_pc_oms


# ============================================================================
# AI AGENT CONFIGURATION (Grove API for OpenAI)
# ============================================================================

# Grove API key — set via environment variable:  export GROVE_API_KEY=<your-key>
grove.api.key=${GROVE_API_KEY:}

# Grove API URL (default is production endpoint)
grove.api.url=https://grove-gateway-prod.azure-api.net/grove-foundry-prod/openai/v1

# Model/Deployment to use - MUST match your Grove API deployment name
# Common options: gpt-35-turbo, gpt-4-deployment, gpt-4-32k, openai-gpt4
# Contact Grove support for your exact deployment name
grove.api.model=gpt-5.4

# Temperature (0.0-1.0, lower = more deterministic, higher = more creative)
grove.api.temperature=0.7

# Max tokens in response
grove.api.max-tokens=1000

# Timeout in seconds
grove.api.timeout-seconds=30


# ============================================================================
# VOYAGE AI CONFIGURATION (Embeddings for Hybrid Search)
# ============================================================================

# Voyage AI API key — set via environment variable:  export VOYAGE_AI_KEY=<your-key>
voyage.ai.key=${VOYAGE_AI_KEY:}

# Voyage AI API URL (MongoDB Atlas endpoint for Voyage AI)
voyage.ai.url=https://ai.mongodb.com/v1

# Embedding model to use (voyage-4-large is optimized for retrieval)
voyage.ai.model=voyage-4-large

# Input type for embeddings (document for indexing, query for searching)
voyage.ai.input-type=document

# Timeout in seconds
voyage.ai.timeout-seconds=30

# Generate embeddings for existing products on startup (set to true once, then false)
generate.embeddings.enabled=false


# Server Configuration
server.port=8080

# Application Name
spring.application.name=demo_pc_oms

# Logging (set to DEBUG to trace MongoDB queries during deep-dive sessions)
logging.level.org.springframework.data.mongodb=INFO

# Jackson JSON Configuration
# Exclude null fields from JSON responses for cleaner API output
spring.jackson.default-property-inclusion=non_null

